name: Bug report
description: Something behaves differently from what the documentation says
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What you expected, and what happened instead.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `node setup.mjs --dry-run`
        2. ...
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: macOS 15, Windows 11, Ubuntu 24.04
    validations:
      required: true
  - type: input
    id: versions
    attributes:
      label: Node and Claude Code versions
      description: Output of `node -v` and `claude --version`.
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Command output
      description: Paste the full output. It is rendered as code, no backticks needed.
      render: shell
